<!DOCTYPE html>
<html>
<head>
    <title>Customers List</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #ffecd2, #fcb69f);
            margin: 0;
            padding: 0;
        }

        .container {
            width: 80%;
            margin: 40px auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 5px 15px rgba(0,0,0,0.2);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: #2c3e50;
            color: white;
            padding: 10px;
        }

        td {
            padding: 10px;
            text-align: center;
        }

        tr:nth-child(even) {
            background: #f2f2f2;
        }

        tr:hover {
            background: #ddd;
        }

        .back-btn {
            display: inline-block;
            margin-top: 15px;
            padding: 8px 12px;
            background: #27ae60;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }

        .back-btn:hover {
            background: #1e8449;
        }

        .email {
            color: #2980b9;
            font-weight: bold;
        }

        .phone {
            color: #8e44ad;
        }
    </style>

</head>
<body>

<div class="container">
    <h2>👥 Customers List</h2>

    <table>
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Email</th>
            <th>Phone</th>
        </tr>

        {% for c in customers %}
        <tr>
            <td>{{ c.customer_id }}</td>
            <td>{{ c.name }}</td>
            <td class="email">{{ c.email }}</td>
            <td class="phone">{{ c.phone }}</td>
        </tr>
        {% endfor %}
    </table>

    <a href="/" class="back-btn">⬅ Back</a>
</div>

</body>
</html>
