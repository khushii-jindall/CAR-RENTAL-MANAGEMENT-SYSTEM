<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add Customer</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

    <style>
        .form-group {
            margin-bottom: 12px;
        }

        label {
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 3px;
            display: block;
        }
    </style>
</head>

<body>

<div class="navbar">👤 Add Customer</div>

<div class="container">

    <form method="POST" action="/add_customer" onsubmit="return validateForm()">

        <div class="form-group">
            <label>Full Name</label>
            <input name="name" placeholder="Enter full name" required>
        </div>

        <div class="form-group">
            <label>Email Address</label>
            <input type="email" name="email" placeholder="example@gmail.com" required>
        </div>

        <div class="form-group">
            <label>Phone Number</label>
            <input type="tel" name="phone" placeholder="10 digit number"
                   pattern="[0-9]{10}" required>
        </div>

        <div class="form-group">
            <label>Driving License Number</label>
            <input name="license_no" placeholder="e.g. DL1234567890" required>
        </div>

        <button type="submit" id="submitBtn">Add Customer</button>
    </form>

    <a href="/" class="back">⬅ Back</a>

</div>

<script>
function validateForm() {
    let phone = document.querySelector("input[name='phone']").value;
    let license = document.querySelector("input[name='license_no']").value;

    if (phone.length !== 10) {
        alert("Phone number must be 10 digits!");
        return false;
    }

    if (license.length < 6) {
        alert("Enter valid license number!");
        return false;
    }

    document.getElementById("submitBtn").innerText = "Adding...";
    return true;
}
</script>

</body>
</html>
